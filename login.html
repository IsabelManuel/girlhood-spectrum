<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Girlhood Spectrum</title>
  <link rel="icon" type="image/png" href="Logo_girlhood_spectrum_png-removebg.png">
  <link rel="stylesheet" href="styles-new.css?v=2">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body class="auth-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="Logo_girlhood_spectrum_png-removebg.png" alt="Girlhood Spectrum" class="nav-logo-img"> Girlhood Spectrum</a>
      <div class="nav-buttons">
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="pt" onclick="setLang('pt')">PT</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
        <a href="signup.html" class="btn btn-secondary" data-i18n="nav.register">Registar</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-box">
      <h1 data-i18n="login.title">Bem-vinda de volta! 👋</h1>
      <p class="auth-subtitle" data-i18n="login.subtitle">Entra na tua conta para continuares a apoiar as tuas amigas</p>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email" data-i18n="login.emailLabel">Email</label>
          <input type="email" id="email" name="email" placeholder="o_teu_email@exemplo.com" data-i18n-placeholder="login.emailPH" required>
        </div>
        <div class="form-group">
          <label for="password" data-i18n="login.passLabel">Palavra-passe</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="login.btn">Entrar →</button>
      </form>

      <div class="divider" data-i18n="login.divider">ou</div>

      <button type="button" class="btn btn-secondary btn-block" onclick="loginWithGoogle()" data-i18n="login.googleBtn">🔐 Entrar com Google</button>

      <div class="auth-footer">
        <p><span data-i18n="login.noAccount">Não tens conta?</span> <a href="signup.html" data-i18n="login.registerHere">Registar-te aqui</a></p>
        <p><a href="forgot-password.html" data-i18n="login.forgotPass">Esqueceste a palavra-passe?</a></p>
      </div>
    </div>
  </div>

  <script src="lang.js"></script>
  <script src="auth.js"></script>
</body>
</html>
