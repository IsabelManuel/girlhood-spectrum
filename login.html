<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Girlhood Spectrum</title>
  <link rel="stylesheet" href="styles-new.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body class="auth-page">
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">🌷 Girlhood Spectrum</a>
      <div class="nav-buttons">
        <a href="signup.html" class="btn btn-secondary">Registar</a>
      </div>
    </div>
  </nav>

  <!-- Auth Container -->
  <div class="auth-container">
    <div class="auth-box">
      <h1>Bem-vinda de volta! 👋</h1>
      <p class="auth-subtitle">Entra na tua conta para continuares a apoiar as tuas amigas</p>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="o_teu_email@exemplo.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Palavra-passe</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="••••••••"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Entrar →
        </button>
      </form>

      <div class="divider">ou</div>

      <button type="button" class="btn btn-secondary btn-block" onclick="loginWithGoogle()">
        🔐 Entrar com Google
      </button>

      <div class="auth-footer">
        <p>Não tens conta? <a href="signup.html">Registar-te aqui</a></p>
        <p><a href="forgot-password.html">Esqueceste a palavra-passe?</a></p>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
