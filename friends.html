<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Amigos</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
</head>
<body>

<header class="top-header">
  <h1>👥 Meus Amigos</h1><br>
  <p class="subtitle">conecta-te com amigos e acompanha o bem-estar deles 💖</p>
</header>

<main class="center-container">

  <section class="login-box friends-section">

    <!-- ADD FRIEND SECTION -->
    <div class="add-friend-container">
      <h2>Adicionar Amiga</h2>
      
      <form id="addFriendForm" class="add-friend-form">
        <input 
          type="text" 
          id="friendNameInput" 
          placeholder="Nome da amiga"
          required>
        <button type="submit" class="submit-btn">➕ Adicionar</button>
      </form>
    </div>

    <hr class="divider">

    <!-- FRIENDS LIST -->
    <div class="friends-list-container">
      <h2>Tuas Amigas 👯</h2>
      
      <div class="friends-list" id="friendsList">
        <!-- FRIENDS LOADED BY JAVASCRIPT -->
      </div>
    </div>

    <hr class="divider">

    <!-- NAVIGATION BUTTONS -->
    <div class="button-group">
      <button type="button" onclick="window.location.href='mood.html'" class="nav-btn">➕ Meu Novo Mood</button>
      <button type="button" onclick="window.location.href='wellness-challenges.html'" class="nav-btn">🎯 Desafios de Bem-Estar</button>
      <button type="button" onclick="window.location.href='empathy-podium.html'" class="nav-btn">🏆 Pódio de Empatia</button>
      <button type="button" onclick="window.location.href='history.html'" class="nav-btn">📊 Meu Histórico</button>
    </div>

  </section>

</main>

<footer>
   <p>© 2026 Girlhood Spectrum</p>
</footer>

</body>
</html>
