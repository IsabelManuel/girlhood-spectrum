<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Palavra-passe - Girlhood Spectrum</title>
  <link rel="icon" type="image/png" href="Logo_girlhood_spectrum_png-removebg.png">
  <link rel="stylesheet" href="styles-new.css?v=2">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body class="auth-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="Logo_girlhood_spectrum_png-removebg.png" alt="Girlhood Spectrum" class="nav-logo-img"><span class="logo-text"> Girlhood Spectrum</span></a>
      <div class="nav-buttons">
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="pt" onclick="setLang('pt')">PT</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
        <a href="login.html" class="btn btn-secondary" data-i18n="nav.login">Entrar</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-box">
      <h1 data-i18n="forgot.title">Recuperar Palavra-passe 🔑</h1>
      <p class="auth-subtitle" data-i18n="forgot.subtitle">Redefine a tua palavra-passe para recuperares acesso à conta</p>

      <form id="forgotForm" class="auth-form">
        <div class="form-group">
          <label for="email" data-i18n="forgot.emailLabel">Email</label>
          <input type="email" id="email" name="email" placeholder="o_teu_email@exemplo.com" data-i18n-placeholder="forgot.emailPH" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" data-i18n="forgot.btn">Enviar Link de Recuperação</button>
      </form>

      <div class="divider" data-i18n="forgot.divider">ou</div>

      <div class="auth-footer">
        <p><span data-i18n="forgot.remember">Lembrou-se da palavra-passe?</span> <a href="login.html" data-i18n="forgot.backLogin">Volta ao Login</a></p>
        <p><span data-i18n="forgot.noAccount">Não tens conta?</span> <a href="signup.html" data-i18n="forgot.register">Registar-te aqui</a></p>
      </div>
    </div>
  </div>

  <script src="lang.js"></script>
  <script src="auth.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      alert(`Enviámos um link de recuperação para ${email} ✉️`);
      setTimeout(() => { window.location.href = 'login.html'; }, 2000);
    });
  </script>
</body>
</html>
