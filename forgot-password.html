<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Palavra-passe - Girlhood Spectrum</title>
  <link rel="stylesheet" href="styles-new.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body class="auth-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">🌷 Girlhood Spectrum</a>
      <div class="nav-buttons">
        <a href="login.html" class="btn btn-secondary">Entrar</a>
      </div>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-box">
      <h1>Recuperar Palavra-passe 🔑</h1>
      <p class="auth-subtitle">Redefine a tua palavra-passe para recuperares acesso à conta</p>

      <form id="forgotForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="o_teu_email@exemplo.com"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          Enviar Link de Recuperação
        </button>
      </form>

      <div class="divider">ou</div>

      <div class="auth-footer">
        <p>Lembrou-se da palavra-passe? <a href="login.html">Volta ao Login</a></p>
        <p>Não tens conta? <a href="signup.html">Registar-te aqui</a></p>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      alert(`Enviámos um link de recuperação para ${email} ✉️`);
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    });
  </script>
</body>
</html>
