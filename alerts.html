<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertas - Girlhood Spectrum</title>
  <link rel="icon" type="image/png" href="Logo_girlhood_spectrum_png-removebg.png">
  <link rel="stylesheet" href="styles-new.css?v=2">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');</script>
</head>
<body class="dashboard-page">
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="Logo_girlhood_spectrum_png-removebg.png" alt="Girlhood Spectrum" class="nav-logo-img"> Girlhood Spectrum</a>
      <div class="nav-buttons">
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="pt" onclick="setLang('pt')">PT</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
        <a href="dashboard.html" class="btn btn-ghost" data-i18n="nav.dashboard">Dashboard</a>
        <a href="profile.html"   class="btn btn-ghost" data-i18n="nav.profile">Perfil</a>
        <button onclick="logout()" class="btn btn-ghost" data-i18n="nav.logout">Sair</button>
      </div>
    </div>
  </nav>

  <div class="dashboard-container">
    <aside class="dashboard-sidebar">
      <div class="sidebar-card">
        <h3 data-i18n="sidebar.menu">Menu</h3>
        <ul class="sidebar-menu">
          <li><a href="dashboard.html" data-i18n="nav.dashboard">📊 Dashboard</a></li>
          <li><a href="group.html"     data-i18n="sidebar.myGroup">👫 Meu Grupo</a></li>
          <li><a href="alerts.html"    data-i18n="sidebar.alerts">📬 Alertas</a></li>
          <li><a href="profile.html"   data-i18n="sidebar.profile">👤 Perfil</a></li>
          <li><a href="settings.html"  data-i18n="sidebar.settings">⚙️ Definições</a></li>
        </ul>
      </div>
    </aside>

    <main class="dashboard-content">
      <div id="fearAlertsContainer" style="display: none; margin-bottom: 1.5rem;"></div>

      <section class="content-section">
        <h2 data-i18n="alerts.title">📬 Alertas do Grupo</h2>
        <div id="alertsContainer" style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1.5rem;"></div>
      </section>

      <section id="emptyState" class="content-section" style="display: none; text-align: center; padding: 3rem;">
        <p style="font-size: 2rem; margin-bottom: 1rem;">✨</p>
        <h3 data-i18n="alerts.empty">Nenhum alerta no momento</h3>
        <p style="color: var(--text-secondary); margin-top: 1rem;" data-i18n="alerts.emptyDesc">Quando alguém do teu grupo tiver sentimentos difíceis, verás aqui!</p>
      </section>
    </main>
  </div>

  <script src="lang.js"></script>
  <script src="auth.js"></script>
  <script src="alerts.js"></script>
</body>
</html>
